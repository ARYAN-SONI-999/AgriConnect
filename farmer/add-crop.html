<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Crop - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/farmer.css">
</head>

<body>

    <nav class="navbar farmer-header">
        <div class="container nav-flex">
            <a href="farmer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="farmer-home.html">Dashboard</a>
                <a href="orders.html">Orders</a>
                <a href="profit.html">Profit</a>
                <a href="profile.html">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container fade-in" style="padding-top: 40px; max-width: 600px;">
            <h1 style="margin-bottom: 30px;">List New Crop</h1>

            <form id="addCropForm" class="card" novalidate>
                <div class="form-group">
                    <label for="cropName">Crop Name</label>
                    <input type="text" id="cropName" name="name" required placeholder="e.g. Red Potatoes">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="seasonal">Seasonal Vegetable</option>
                        <option value="organic">Organic Produce</option>
                        <option value="fruits">Fresh Fruit</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price per Kg (₹)</label>
                    <input type="number" id="price" name="price" required min="1" step="0.5">
                </div>

                <div class="form-group">
                    <label for="cropQuantity">Available Stock (kg)</label>
                    <input type="number" id="cropQuantity" name="quantity" min="0" step="0.5" placeholder="e.g. 100" required>
                </div>

                <div class="form-group">
                    <label for="cropDescription">Description (Optional)</label>
                    <textarea id="cropDescription" name="description" rows="3" placeholder="Tell customers about this crop..." style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:1rem;resize:vertical;"></textarea>
                </div>

                <div class="form-group">
                    <label for="cropImage">Image URL (Optional)</label>
                    <input type="text" id="cropImage" name="image" placeholder="e.g. https://images.unsplash.com/photo-..." style="background: white;">
                    <small style="color: var(--text-muted)">Provide an image URL or leave blank to auto-generate a placeholder</small>
                    <img id="imagePreview" src="" alt="Crop image preview" style="display:none;width:120px;height:80px;object-fit:cover;border-radius:8px;margin-top:8px;">
                </div>

                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <a href="farmer-home.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary"
                        style="background-color: var(--vibrant-orange); border: none;">List Crop</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/translate.js"></script>
    <script src="../js/data.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/farmer.js?v=3"></script>
    <script>
        const imageInput = document.getElementById('cropImage');
        const imagePreview = document.getElementById('imagePreview');

        imageInput.addEventListener('input', () => {
            const url = imageInput.value.trim();
            if (url) {
                imagePreview.src = url;
                imagePreview.style.display = 'block';
            } else {
                imagePreview.style.display = 'none';
            }
        });
    </script>
</body>

</html>
