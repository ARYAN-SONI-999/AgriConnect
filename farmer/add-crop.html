<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Crop - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/farmer.css">
</head>

<body>

    <nav class="navbar farmer-header">
        <div class="container nav-flex">
            <a href="farmer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="farmer-home.html">Dashboard</a>
                <a href="orders.html">Orders</a>
                <a href="profit.html">Profit</a>
                <a href="profile.html">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <div class="container fade-in" style="padding-top: 40px; max-width: 600px;">
        <h1 style="margin-bottom: 30px;">List New Crop</h1>

        <form id="addCropForm" class="card">
            <div class="form-group">
                <label for="cropName">Crop Name</label>
                <input type="text" id="cropName" required placeholder="e.g. Red Potatoes">
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="seasonal">Seasonal Vegetable</option>
                    <option value="organic">Organic Produce</option>
                    <option value="fruits">Fresh Fruit</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price per Kg (RS)</label>
                <input type="number" id="price" required min="1" step="0.5">
            </div>

            <div class="form-group">
                <label for="cropImage">Image URL (Optional)</label>
                <input type="text" id="cropImage" placeholder="e.g. https://images.unsplash.com/photo-..." style="background: white;">
                <small style="color: #999">Provide an image URL or leave blank to auto-generate a placeholder</small>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <a href="farmer-home.html" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"
                    style="background-color: var(--vibrant-orange); border: none;">List Crop</button>
            </div>
        </form>
    </div>

    <script src="../js/translate.js"></script>
    <script src="../js/data_api.js?v=2"></script>
    <script src="../js/data.js?v=2"></script>
    <script src="../js/auth.js?v=2"></script>
    <script src="../js/farmer.js?v=2"></script>
</body>

</html>
