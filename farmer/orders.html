<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Orders - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/farmer.css">
</head>

<body>

    <nav class="navbar farmer-header">
        <div class="container nav-flex">
            <a href="farmer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="farmer-home.html">Dashboard</a>
                <a href="orders.html" style="color: var(--vibrant-orange)">Orders</a>
                <a href="profit.html">Profit</a>
                <a href="profile.html">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container fade-in" style="padding-top: 40px;">
            <h1>Incoming Orders</h1>

            <!-- Filter and Search Bar -->
            <div style="display:flex;gap:12px;margin:20px 0;flex-wrap:wrap;align-items:center;">
                <label for="orderStatusFilter" style="font-weight:600;">Filter Status:</label>
                <select id="orderStatusFilter" style="padding:10px 16px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;background:white;">
                    <option value="all">All Orders</option>
                    <option value="Pending">Pending</option>
                    <option value="Accepted">Accepted</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Delivered">Delivered</option>
                </select>
                <input type="search" id="orderSearch" placeholder="Search by customer or ID..." style="flex:1;min-width:200px;padding:10px 16px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;">
            </div>

            <div class="table-scroll-wrapper" style="margin-top: 20px;">
                <table style="width: 100%; border-collapse: collapse;">
                    <caption>Incoming Customer Orders List</caption>
                    <thead>
                        <tr style="text-align: left; background: #fff8f0; border-bottom: 2px solid #ffedd5;">
                            <th scope="col" style="padding: 15px;">Order ID</th>
                            <th scope="col" style="padding: 15px;">Date</th>
                            <th scope="col" style="padding: 15px;">Customer</th>
                            <th scope="col" style="padding: 15px;">Items</th>
                            <th scope="col" style="padding: 15px;">Total</th>
                            <th scope="col" style="padding: 15px;">Status</th>
                            <th scope="col" style="padding: 15px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="orderListBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/translate.js"></script>
    <script src="../js/data.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/farmer.js?v=3"></script>
</body>

</html>
