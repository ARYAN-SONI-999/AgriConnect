<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Orders - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/farmer.css">
</head>

<body>

    <nav class="navbar farmer-header">
        <div class="container nav-flex">
            <a href="farmer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="farmer-home.html">Dashboard</a>
                <a href="orders.html" style="color: var(--vibrant-orange)">Orders</a>
                <a href="profit.html">Profit</a>
                <a href="profile.html">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <div class="container fade-in" style="padding-top: 40px;">
        <h1>Incoming Orders</h1>

        <div class="card" style="margin-top: 30px;">
            <table style="width: 100%; border-collapse: collapse;">
                <caption>Incoming Customer Orders List</caption>
                <thead>
                    <tr style="text-align: left; background: #fff8f0;">
                        <th scope="col" style="padding: 15px;">Order ID</th>
                        <th scope="col" style="padding: 15px;">Customer</th>
                        <th scope="col" style="padding: 15px;">Items</th>
                        <th scope="col" style="padding: 15px;">Total</th>
                        <th scope="col" style="padding: 15px;">Status</th>
                        <th scope="col" style="padding: 15px;">Action</th>
                    </tr>
                </thead>
                <tbody id="orderListBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/translate.js"></script>
    <script src="../js/data_api.js?v=2"></script>
    <script src="../js/data.js?v=2"></script>
    <script src="../js/auth.js?v=2"></script>
    <script src="../js/farmer.js?v=2"></script>
