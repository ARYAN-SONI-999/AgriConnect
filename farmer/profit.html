<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Analytics - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/farmer.css">
    <style>
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 320px;
            margin-top: 40px;
            padding: 30px 20px 20px;
            background: #fafafa;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            overflow-x: auto;
            gap: 10px;
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            flex-grow: 1;
            min-width: 50px;
        }

        .bar-container {
            width: 32px;
            height: 200px;
            background: #e2e8f0;
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        .bar {
            background: linear-gradient(to top, var(--vibrant-orange), #ff9f43);
            width: 100%;
            border-radius: 20px;
            transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .bar:hover {
            filter: brightness(1.05);
            box-shadow: 0 0 12px rgba(230, 126, 34, 0.3);
        }

        .bar-value {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
        }

        .bar-label {
            margin-top: 12px;
            color: var(--text-medium);
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Metric Grid Cards */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .metric-card {
            background: #ffffff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #f1f5f9;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .metric-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .metric-info {
            display: flex;
            flex-direction: column;
        }

        .metric-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
        }
    </style>
</head>

<body>

    <nav class="navbar farmer-header">
        <div class="container nav-flex">
            <a href="farmer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="farmer-home.html">Dashboard</a>
                <a href="orders.html">Orders</a>
                <a href="profit.html" style="color: var(--vibrant-orange)">Profit</a>
                <a href="profile.html">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <div class="container fade-in" style="padding-top: 40px;">
        <h1 style="margin-bottom: 8px;">Profit Analytics</h1>
        <p style="color: var(--text-medium); margin-bottom: 30px;">Track your monthly earnings, top-performing crops, and sales performance overview.</p>

        <div class="card">
            <h3 style="margin-bottom: 25px;">Monthly Earnings (2025)</h3>

            <div class="bar-chart" id="profitChart">
                <!-- Populated by JS -->
            </div>

            <div class="metric-grid">
                <div class="metric-card">
                    <div class="metric-icon" style="background: #fff3e0; color: #e67e22;">💰</div>
                    <div class="metric-info">
                        <span class="metric-title">Total Revenue</span>
                        <span class="metric-value" id="statRevenue">RS 0</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon" style="background: #eafaf1; color: #2ecc71;">🌾</div>
                    <div class="metric-info">
                        <span class="metric-title">Top Product</span>
                        <span class="metric-value" id="statProduct">N/A</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon" style="background: #eef2ff; color: #6366f1;">📈</div>
                    <div class="metric-info">
                        <span class="metric-title">Growth</span>
                        <span class="metric-value" id="statGrowth">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/translate.js"></script>
    <script src="../js/data.js?v=2"></script>
    <script src="../js/auth.js?v=2"></script>
    <script src="../js/farmer.js?v=2"></script>
</body>

</html>
