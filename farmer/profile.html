<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/farmer.css">
</head>

<body>

    <nav class="navbar farmer-header">
        <div class="container nav-flex">
            <a href="farmer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="farmer-home.html">Dashboard</a>
                <a href="orders.html">Orders</a>
                <a href="profit.html">Profit</a>
                <a href="profile.html" style="color: var(--vibrant-orange)">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <div class="container fade-in" style="padding-top: 40px;">
        <h1>My Profile</h1>

        <div class="card" style="max-width: 600px; margin: 30px auto 0;">
            <div style="text-align: center; margin-bottom: 30px;">
                <div
                    style="width: 100px; height: 100px; background: #fff3e0; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 20px;">
                    👨‍🌾
                </div>
                <h2 id="farmerName">John Farmer</h2>
                <span
                    style="background: var(--vibrant-orange); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;">Verified
                    Farmer</span>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label for="nameInput">Full Name</label>
                    <input type="text" id="nameInput" required>
                </div>
                <div class="form-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" required>
                </div>
                <div class="form-group">
                    <label for="mobileInput">Mobile Number</label>
                    <input type="text" id="mobileInput" required placeholder="10-digit number">
                </div>
                <div class="form-group">
                    <label for="locationInput">Farm Location</label>
                    <input type="text" id="locationInput" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; background: var(--vibrant-orange); border:none;">Save Profile</button>
            </form>
        </div>
    </div>

    <script src="../js/translate.js"></script>
    <script src="../js/data_api.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/farmer.js"></script>
    <script>
        const user = DB.getCurrentUser();
        if (user) {
            document.getElementById('farmerName').textContent = user.name;
            document.getElementById('nameInput').value = user.name;
            document.getElementById('emailInput').value = user.email;
            document.getElementById('mobileInput').value = user.mobile || '';
            document.getElementById('locationInput').value = user.location || '';
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) return;

            const name = document.getElementById('nameInput').value;
            const email = document.getElementById('emailInput').value;
            const mobile = document.getElementById('mobileInput').value;
            const location = document.getElementById('locationInput').value;

            try {
                const res = await API.updateUser(user.id, { name, email, location, mobile });
                if (res.success) {
                    const updatedUser = { ...user, name, email, location, mobile };
                    localStorage.setItem(DB.CURRENT_USER, JSON.stringify(updatedUser));

                    // Update local user list cache
                    let users = DB.getUsers();
                    const idx = users.findIndex(u => u.id === user.id);
                    if (idx !== -1) {
                        users[idx] = { ...users[idx], name, email, location, mobile };
                        localStorage.setItem(DB.USERS, JSON.stringify(users));
                    }

                    showToast('Profile updated successfully!', 'success');
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                }
            } catch (err) {
                showToast('Failed to update profile: ' + err.message, 'error');
            }
        });
    </script>
</body>

</html>
