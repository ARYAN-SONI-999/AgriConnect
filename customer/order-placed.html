<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/customer.css">
    <style>
        .success-box {
            text-align: center;
            padding: 60px 20px;
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow-md);
        }

        .success-icon {
            font-size: 5rem;
            color: var(--primary-green);
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container fade-in">
        <div class="success-box">
            <span class="success-icon">✅</span>
            <h1>Order Placed Successfully!</h1>
            <p style="margin: 20px 0; color: var(--text-muted);">Thank you for supporting local farmers. Your fresh
                produce will be delivered shortly.</p>
            <a href="customer-home.html" class="btn btn-primary">Continue Shopping</a>
        </div>
    </div>
    <script src="../js/translate.js"></script>
    <script src="../js/data_api.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/customer.js"></script>
</body>

</html>
