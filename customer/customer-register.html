<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Customer - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <main class="page-content">
        <div class="auth-wrapper theme-customer">
            <div class="auth-container">
                <div class="auth-image-side">
                    <div class="auth-image-text">
                        <h3>Join the<br>Community</h3>
                        <p>Experience the freshest produce every day.</p>
                    </div>
                </div>

                <div class="auth-form-side">
                    <a href="../index.html" class="logo-text">🌱 AgriConnect</a>
                    <div class="auth-header">
                        <h2>Create Account</h2>
                        <p>Sign up as a new Customer</p>
                    </div>

                    <form id="registerForm" novalidate>
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" autocomplete="name" required>
                        </div>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" autocomplete="username" required placeholder="Create a username">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" autocomplete="email" required>
                        </div>
                        <div class="form-group">
                            <label for="mobile">Mobile Number</label>
                            <input type="tel" id="mobile" name="mobile" autocomplete="tel" placeholder="10-digit number" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" autocomplete="new-password" required>
                            <div id="passwordStrength" class="form-error" style="display:none"></div>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
                    </form>

                    <div style="text-align: center; margin-top: 20px;">
                        <p style="color: #666">Already have an account? <a href="customer-login.html"
                                style="color: #11998e; font-weight: 600">Login</a></p>
                    </div>
                    <a href="../index.html" class="back-link">← Back to Home</a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/translate.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');

        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            if (!pwd) {
                strengthDiv.style.display = 'none';
                return;
            }
            const res = Validation.validatePassword(pwd);
            if (!res.valid) {
                strengthDiv.style.display = 'block';
                strengthDiv.textContent = '⚠️ ' + res.message;
                strengthDiv.style.color = '#dc2626';
            } else {
                strengthDiv.style.display = 'block';
                strengthDiv.textContent = '✅ Strong Password';
                strengthDiv.style.color = '#16a34a';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!Validation.validateEmail(email)) {
                showToast('Invalid Email Address!', 'error');
                return;
            }

            if (!Validation.validateMobile(mobile)) {
                showToast('Invalid Mobile Number!', 'error');
                return;
            }

            const pwdRes = Validation.validatePassword(password);
            if (!pwdRes.valid) {
                showToast(pwdRes.message, 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return;
            }

            const hashedPassword = Validation.hashPassword(password);

            try {
                await DB.registerUser({ name, username, email, mobile, password: hashedPassword, role: 'customer' });
                showToast('Registration Successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'customer-login.html';
                }, 1500);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>

</body>

</html>
