<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Products - AgriConnect</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>

<body>

    <nav class="navbar customer-header">
        <div class="container nav-flex">
            <a href="customer-home.html" class="logo">🌱 AgriConnect</a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="nav-links">
                <a href="customer-home.html">Home</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="cart.html" class="cart-icon">
                    🛒 <span id="cartCount" class="cart-count">0</span>
                </a>
                <a href="profile.html">Profile</a>
                <div class="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container" style="padding-top: 40px;">
            <h1 class="fade-in">Organic Series</h1>
            <p class="fade-in" style="color: var(--text-muted)">100% Certified Organic Produce</p>

            <!-- Search and Sort Panel -->
            <div class="control-panel fade-in" style="display: flex; gap: 20px; margin: 20px 0; align-items: center; flex-wrap: wrap;">
                <div class="autocomplete-wrapper" style="flex-grow:1;">
                    <input type="text" id="searchInput" name="search" placeholder="Search crops..." style="width: 100%; padding: 12px 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;">
                </div>
                <label for="sortSelect" style="display:none">Sort by</label>
                <select id="sortSelect" name="sort" style="padding: 12px 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: white; cursor: pointer;">
                    <option value="default">Sort by: Default</option>
                    <option value="price-low-high">Price: Low to High</option>
                    <option value="price-high-low">Price: High to Low</option>
                    <option value="name-a-z">Alphabetical: A to Z</option>
                </select>
            </div>

            <div class="product-grid" id="productsContainer">
                <!-- Populated by customer.js -->
            </div>
        </div>
    </main>

    <script src="../js/translate.js"></script>
    <script src="../js/data.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/reviews.js"></script>
    <script src="../js/customer.js?v=3"></script>
</body>

</html>
